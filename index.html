<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيم جيم لايف زون - النسخة الكاملة</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #f59e0b;
            --order-color: #0ea5e9; 
            --text-primary: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-primary);
            margin: 0; overflow-x: hidden; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
        }

        /* شاشة الصيانة العالمية */
        #maintenance-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white;
        }
        .maintenance-icon { font-size: 6rem; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        #admin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); 
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 20000; text-align: center;
            animation: border-flash 0.3s infinite alternate;
        }
        
        @keyframes border-flash {
            from { box-shadow: inset 0 0 50px red; }
            to { box-shadow: inset 0 0 150px #000; }
        }

        .flashing-title { color: #ff0000; font-size: 2.5rem; margin-bottom: 20px; animation: blink 0.2s infinite alternate; font-weight: 900; }
        .flashing-msg { color: #fff; font-size: 4rem; font-weight: 900; animation: shake 0.1s infinite; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.1; } }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        #admin-trigger { position: fixed; bottom: 0; left: 0; width: 60px; height: 60px; background: transparent; cursor: pointer; z-index: 100001; }

        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9998; }
        .shiny-text { font-size: 3.5rem; font-weight: bold; color: var(--accent-color); }

        #top-timer-bar { display: none; background-color: var(--accent-color); color: #432b05; padding: 8px 30px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; margin-top: 20px; }

        #categories-screen { display: none; width: 95%; max-width: 1400px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 40px 20px; }
        .cat-card { background: var(--card-bg); border-radius: 15px; border-bottom: 5px solid var(--accent-color); overflow: hidden; }
        .cat-card.special { border-bottom: 5px solid var(--order-color); }
        .cat-main { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .points-col { display: flex; flex-direction: column; gap: 5px; width: 80px; padding: 10px; }
        .point-box { background: #334155; color: #fff; padding: 12px 5px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 30px; margin: 3px; font-size: 0.9rem; }
        .point-box.order-pts { background: #075985; border: 1px solid var(--order-color); }
        .point-box.used { opacity: 0.2; cursor: default; }
        .cat-title { text-align: center; background: #f1f5f9; color: #000; padding: 10px; font-weight: bold; }

        #game-interface { display: none; width: 98%; justify-content: space-between; margin-top: 20px; }
        .sidebar { width: 220px; background: rgba(30, 41, 59, 0.6); border: 2px solid var(--accent-color); padding: 15px; border-radius: 15px; text-align: center;}
        
        .score-display { font-size: 3.5rem; font-weight: bold; color: var(--accent-color); cursor: pointer; transition: 0.3s; }
        .score-display:hover { color: #fff; transform: scale(1.1); }

        .help-btn { background: #334155; color: white; border: 1px solid var(--accent-color); padding: 10px; margin: 5px 0; width: 100%; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .help-btn.used { opacity: 0.3; text-decoration: line-through; pointer-events: none; }
        .reset-btn { background: #ef4444 !important; border-color: #f87171 !important; margin-top: 20px !important; }

        .question-card { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; flex-grow: 1; margin: 0 20px; }
        .win-btn { background: var(--accent-color); color: #000; border: none; padding: 15px 30px; margin: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .no-one-btn { background: #64748b; color: white; }

        .order-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 800px; margin: 20px auto; }
        .order-item { background: #1e293b; border: 2px solid #334155; padding: 10px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .order-ans-text { display: none; font-size: 1.2rem; color: #4ade80; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .order-rank-label { color: #64748b; font-size: 0.9rem; }
        .order-give-btn { padding: 8px; font-size: 0.8rem; width: 100%; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }

        #setup-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        input { width: 300px; padding: 15px; background: #21262d; border: 1px solid var(--accent-color); color: #fff; text-align: center; margin-bottom: 15px; border-radius: 8px;}
    </style>
</head>
<body>

    <div id="maintenance-screen">
        <div class="maintenance-icon">⚠️</div>
        <h1 style="font-size: 3rem;">الموقع تحت الصيانة</h1>
        <p style="font-size: 1.5rem; color: #94a3b8;">نعتذر، يتم تحديث اللعبة حالياً. سنعود قريباً!</p>
    </div>

    <div id="admin-overlay">
        <div class="flashing-title">🚨الـمـطـور ابو كيلوا🚨</div>
        <div id="alert-text" class="flashing-msg">إخلاء الموقع فوراً</div>
        <button class="win-btn" onclick="document.getElementById('admin-overlay').style.display='none'">إغلاق مؤقت</button>
    </div>

    <div id="admin-trigger" onclick="handleAdmin()"></div>
    <div id="intro-screen"><div class="shiny-text">سيم جيم لايف زون</div></div>
    <div id="top-timer-bar">00:00</div>

    <div id="setup-screen">
        <h1>🌙 سيم جيم لايف زون</h1>
        <input type="text" id="t1" placeholder="ادخل اسم الفريق الأول">
        <input type="text" id="t2" placeholder="أدخل اسم الفريق الثاني">
        <button class="win-btn" onclick="showCategories()">ابدأ اللعب</button>
    </div>

    <div id="categories-screen"></div>

    <div id="game-interface">
        <div class="sidebar">
            <div id="side-name-1" style="color:var(--accent-color); font-weight:bold;"></div>
            <div class="score-display" id="score1" onclick="manualEdit(1)">0</div>
            <hr border="1" color="#f59e0b" style="margin: 15px 0;">
            <button class="help-btn" onclick="this.classList.add('used')">📞 اتصال بصديق</button>
            <button class="help-btn" onclick="this.classList.add('used')">✌️ اختيار اجابتين</button>
            <button class="help-btn" onclick="this.classList.add('used')">🕳️ الحفرة</button>
            <button class="help-btn reset-btn" onclick="resetGame()">🔄 ترسيت اللعبة</button>
        </div>
        <div class="question-card" id="q-content"></div>
        <div class="sidebar">
            <div id="side-name-2" style="color:var(--accent-color); font-weight:bold;"></div>
            <div class="score-display" id="score2" onclick="manualEdit(2)">0</div>
            <hr border="1" color="#f59e0b" style="margin: 15px 0;">
            <button class="help-btn" onclick="this.classList.add('used')">📞 اتصال بصديق</button>
            <button class="help-btn" onclick="this.classList.add('used')">✌️ اختيار اجابتين</button>
            <button class="help-btn" onclick="this.classList.add('used')">🕳️ الحفرة</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyClRZNm35GpsLiiqXYVUIyt8GOIfa81xlk",
            authDomain: "live-zone-lock.firebaseapp.com",
            projectId: "live-zone-lock",
            storageBucket: "live-zone-lock.firebasestorage.app",
            messagingSenderId: "836342074080",
            appId: "1:836342074080:web:995a0e934ab0147c085e85",
            measurementId: "G-L9TVKCNX42"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'siteControl'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('maintenance-screen').style.display = data.isLocked ? "flex" : "none";
                if (data.alertActive) {
                    document.getElementById('alert-text').innerText = data.alertMsg;
                    document.getElementById('admin-overlay').style.display = "flex";
                } else {
                    document.getElementById('admin-overlay').style.display = "none";
                }
            }
        });

        window.remoteToggleLock = (state) => set(ref(db, 'siteControl/isLocked'), state);
        window.remoteToggleAlert = (state, msg = "") => {
            set(ref(db, 'siteControl/alertActive'), state);
            if(state) set(ref(db, 'siteControl/alertMsg'), msg);
        };
    </script>

    <script>
        const rankPoints = {1:3, 2:5, 3:7, 4:9, 5:11, 6:13, 7:15, 8:17, 9:19, 10:21};
        let score1 = 0, score2 = 0, currentPoints = 0;
        let currentCat = "", currentSide = "", currentPts = 0;

        const bank = {
            "أسئلة دينية": {
                icon: "🕌",
                left: { 200: {q:"ما هي السورة التي تنتهي جميع آياتها بحرف الراء؟", a:"سورة الكوثر"}, 400: {q:"ما هي الصلاة التي لا ركوع فيها ولا سجود؟", a:"صلاة الجنازة"}, 600: {q:"من هو الصحابي الذي اهتز لموته عرش الرحمن؟", a:"سعد بن معاذ"}, 800: {q:"أطول آية في القرآن الكريم؟", a:"آية الدين"}, 1000: {q:"أول من جهر بالقرآن في مكة؟", a:"عبدالله بن مسعود"} },
                right: { 200: {q:"سورة تسمى قلب القرآن؟", a:"يس"}, 400: {q:"عدد السجدات في القرآن؟", a:"15"}, 600: {q:"سورة لا تبدأ بالبسملة؟", a:"التوبة"}, 800: {q:"سورة ذكرت فيها البسملة مرتين؟", a:"النمل"}, 1000: {q:"من هو أمين هذه الأمة؟", a:"أبو عبيدة عامر بن الجراح"} }
            },
            "حكام الدول": {
                icon: "👑",
                left: { 200: {q:"من هو ملك المملكة العربية السعودية الحالي؟", a:"الملك سلمان بن عبدالعزيز"}, 400: {q:"من هو حاكم دولة الإمارات العربية المتحدة الحالي؟", a:"الشيخ محمد بن زايد"}, 600: {q:"من هو سلطان عمان الحالي؟", a:"السلطان هيثم بن طارق"}, 800: {q:"من هو ملك المغرب الحالي؟", a:"الملك محمد السادس"}, 1000: {q:"من هو رئيس جمهورية مصر العربية الحالي؟", a:"عبد الفتاح السيسي"} },
                right: { 200: {q:"من هو أمير دولة قطر الحالي؟", a:"الشيخ تميم بن حمد"}, 400: {q:"من هو ملك الأردن الحالي؟", a:"الملك عبدالله الثاني"}, 600: {q:"من هو أمير دولة الكويت الحالي؟", a:"الشيخ مشعل الأحمد الصباح"}, 800: {q:"من هو ملك البحرين الحالي؟", a:"الملك حمد بن عيسى"}, 1000: {q:"من هو رئيس العراق الحالي؟", a:"عبد اللطيف رشيد"} }
            },
            "السيارات": {
                icon: "🚗",
                left: { 200: {q:"بلد صنع لمبورغيني؟", a:"إيطاليا"}, 400: {q:"قطعة تبريد المحرك؟", a:"الرديتر"}, 600: {q:"نظام دفع أودي؟", a:"كواترو"}, 800: {q:"محرك أسطوانات متقابلة؟", a:"بوكسر"}, 1000: {q:"أول سيارة إنتاج تجاري؟", a:"فورد موديل T"} },
                right: { 200: {q:"ماركة بـ 4 حلقات؟", a:"أودي"}, 400: {q:"أول سيارة تيسلا؟", a:"رودستر"}, 600: {q:"مقر بي إم دبليو؟", a:"ميونخ"}, 800: {q:"شركة تملك بوجاتي وبورش؟", a:"فولكس فاجن"}, 1000: {q:"يرمز شعار ميتسوبيشي لـ؟", a:"الجواهر الثلاث"} }
            },
            "الترتيب": {
                icon: "🔢", isSpecial: true,
                left: { 200: {q:"رتب أكثر 10 ألعاب شهرة", a:"1. ببجي 2. ماين كرافت 3. روبلوكس 4. كاندي كراش 5. فورتنايت 6. لول 7. كود 8. امونج اس 9. فيفا 10. سيمز"}, 400: {q:"رتب أكثر 10 تطبيقات استخداماً", a:"1. فيسبوك 2. واتساب 3. انستقرام 4. ماسنجر 5. تيك توك 6. تلغرام 7. سناب شات 8. تويتر 9. بنترست 10. كواي"}, 600: {q:"رتب أكثر 10 دول سياحية", a:"1. فرنسا 2. إسبانيا 3. أمريكا 4. إيطاليا 5. تركيا 6. المكسيك 7. بريطانيا 8. ألمانيا 9. اليونان 10. النمسا"}, 800: {q:"رتب أكثر 10 لاعبين شهرة", a:"1. رونالدو 2. ميسي 3. نيمار 4. مبابي 5. صلاح 6. بنزيما 7. هالاند 8. ليفاندوفسكي 9. فينيسيوس 10. هاري كين"}, 1000: {q:"رتب أندية تحقيقاً للأبطال", a:"1. ريال مدريد 2. ميلان 3. ليفربول 4. بايرن 5. برشلونة 6. أياكس 7. مانشستر 8. انتر 9. يوفنتوس 10. بنفيكا"} },
                right: { 200: {q:"رتب شركات سيارات مبيعاً", a:"1. تويوتا 2. فولكس فاجن 3. فورد 4. هيونداي 5. هوندا 6. نيسان 7. جنرال موتورز 8. كيا 9. بي إم دبليو 10. مرسيدس"}, 400: {q:"رتب أغنى 10 أشخاص", a:"1. إيلون ماسك 2. جيف بيزوس 3. برنارد أرنو 4. مارك زوكربيرج 5. لاري إليسون 6. وارن بافيت 7. بيل غيتس 8. لاري بيج 9. ستيف بالمر 10. سيرجي برين"}, 600: {q:"رتب دول سكاناً مسلمين", a:"1. إندونيسيا 2. باكستان 3. الهند 4. بنجلاديش 5. نيجيريا 6. مصر 7. تركيا 8. إيران 9. الجزائر 10. السودان"}, 800: {q:"رتب أقوى 10 جيوش", a:"1. أمريكا 2. روسيا 3. الصين 4. الهند 5. كوريا الجنوبية 6. بريطانيا 7. اليابان 8. تركيا 9. باكستان 10. إيطاليا"}, 1000: {q:"رتب قنوات يوتيوب مشتركين", a:"1. MrBeast 2. T-Series 3. Cocomelon 4. SET India 5. Kids Diana Show 6. Vlad and Niki 7. Like Nastya 8. PewDiePie 9. Zee Music 10. WWE"} }
            },
            "لايف زون": {
                icon: "🏙️",
                left: { 200: {q:"تذبحه وتبكي عليه؟", a:"البصل"}, 400: {q:"له أرجل ولا يمشي؟", a:"الكرسي"}, 600: {q:"يحيا صيفاً ويموت شتاءً؟", a:"المكيف"}, 800: {q:"عين واحدة ولا يرى؟", a:"الإبرة"}, 1000: {q:"يمشي بلا قدمين للأذن؟", a:"الصوت"} },
                right: { 200: {q:"اللاعب الظاهرة؟", a:"رونالدو البرازيلي"}, 400: {q:"عنصر Au؟", a:"الذهب"}, 600: {q:"عاصمة اليابان؟", a:"طوكيو"}, 800: {q:"عدد قلوب الأخطبوط؟", a:"3"}, 1000: {q:"أسرع حشرة؟", a:"اليعسوب"} }
            }
        };

        function handleAdmin() {
            let p = prompt("هوية المطور:");
            if(p !== "123456") return alert("خطأ");
            let action = prompt("1: صيانة\n2: طرد\n3: إيقاف");
            if(action=="1") window.remoteToggleLock(confirm("قفل؟"));
            else if(action=="2") window.remoteToggleAlert(true, prompt("الرسالة:"));
            else if(action=="3") window.remoteToggleAlert(false);
        }

        function showCategories() {
            if(!document.getElementById('t1').value || !document.getElementById('t2').value) return alert("ادخل الأسماء");
            document.getElementById('side-name-1').innerText = document.getElementById('t1').value;
            document.getElementById('side-name-2').innerText = document.getElementById('t2').value;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('top-timer-bar').style.display = 'block';
            startTimer();
            renderCategories();
        }

        function renderCategories() {
            const screen = document.getElementById('categories-screen');
            screen.style.display = 'grid'; screen.innerHTML = "";
            Object.keys(bank).forEach(cat => {
                let rowsLeft = "", rowsRight = "";
                [200, 400, 600, 800, 1000].forEach(p => {
                    if(bank[cat].left[p]) rowsLeft += `<div class="point-box ${bank[cat].left[p].used?'used':''} ${bank[cat].isSpecial?'order-pts':''}" onclick="loadQ('${cat}','left',${p})">${p}</div>`;
                    if(bank[cat].right[p]) rowsRight += `<div class="point-box ${bank[cat].right[p].used?'used':''} ${bank[cat].isSpecial?'order-pts':''}" onclick="loadQ('${cat}','right',${p})">${p}</div>`;
                });
                screen.innerHTML += `<div class="cat-card ${bank[cat].isSpecial?'special':''}">
                    <div class="cat-main"><div class="points-col">${rowsLeft}</div><div style="font-size:2.5rem">${bank[cat].icon}</div><div class="points-col">${rowsRight}</div></div>
                    <div class="cat-title">${cat}</div></div>`;
            });
        }

        function loadQ(cat, side, pts) {
            if(bank[cat][side][pts].used) return;
            currentCat = cat; currentSide = side; currentPts = pts; currentPoints = pts;
            const data = bank[cat][side][pts];
            document.getElementById('categories-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'flex';
            let html = `<h2>${cat} (${pts})</h2><p style="font-size:1.8rem">${data.q}</p>`;
            if(bank[cat].isSpecial) {
                const ansList = data.a.split(/\d+\./).filter(x => x.trim()!="");
                html += `<div class="order-grid">`;
                ansList.forEach((a, i) => {
                    let r = i+1;
                    html += `<div class="order-item">
                        <span class="order-rank-label">مركز ${r} (${rankPoints[r]}ن)</span>
                        <div class="order-ans-text" id="oa-${r}">${a}</div>
                        <div id="ob-${r}"><button class="order-give-btn" style="background:#f59e0b" onclick="givePts(${r},1)">${document.getElementById('t1').value}</button>
                        <button class="order-give-btn" style="background:#0ea5e9" onclick="givePts(${r},2)">${document.getElementById('t2').value}</button></div>
                    </div>`;
                });
                html += `</div><button class="win-btn" onclick="finishQ()">انهاء الجولة</button>`;
            } else {
                html += `<div id="ans" style="display:none; color:#4ade80; font-size:1.8rem; margin:20px">${data.a}</div>
                    <button class="win-btn" onclick="document.getElementById('ans').style.display='block'">كشف الإجابة</button><hr>
                    <button class="win-btn" onclick="addPts(1)">فوز الفريق 1</button>
                    <button class="win-btn" onclick="addPts(2)">فوز الفريق 2</button>
                    <button class="win-btn no-one-btn" onclick="addPts(0)">تخطي</button>`;
            }
            document.getElementById('q-content').innerHTML = html;
        }

        function givePts(r, t) {
            if(t==1) { score1 += rankPoints[r]; document.getElementById('score1').innerText=score1; }
            if(t==2) { score2 += rankPoints[r]; document.getElementById('score2').innerText=score2; }
            document.getElementById(`oa-${r}`).style.display="block";
            document.getElementById(`ob-${r}`).style.display="none";
        }

        function addPts(t) {
            if(t==1) { score1 += currentPoints; document.getElementById('score1').innerText=score1; }
            if(t==2) { score2 += currentPoints; document.getElementById('score2').innerText=score2; }
            finishQ();
        }

        function finishQ() {
            bank[currentCat][currentSide][currentPts].used = true;
            document.getElementById('game-interface').style.display = 'none';
            renderCategories();
        }

        function manualEdit(t) {
            let v = prompt("النقاط:");
            if(v!=null) {
                if(t==1) { score1=parseInt(v); document.getElementById('score1').innerText=score1; }
                else { score2=parseInt(v); document.getElementById('score2').innerText=score2; }
            }
        }

        function resetGame() { if(confirm("تصفير؟")) location.reload(); }
        function startTimer() { let s = 0; setInterval(() => { s++; let m=Math.floor(s/60), sc=s%60; document.getElementById('top-timer-bar').innerText = `${m<10?'0'+m:m}:${sc<10?'0'+sc:sc}`; }, 1000); }
        window.onload = () => { setTimeout(()=>document.getElementById('intro-screen').style.display='none', 2000); document.getElementById('setup-screen').style.display='flex'; };
    </script>
</body>
</html>
