<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيم جيم لايف زون - النسخة النهائية</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #f59e0b;
            --order-color: #0ea5e9; 
            --text-primary: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-primary);
            margin: 0; overflow-x: hidden; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
        }

        /* شاشات الإدارة والتحكم */
        #maintenance-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white;
        }
        #admin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); 
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 20000; text-align: center;
            animation: border-flash 0.3s infinite alternate;
        }
        @keyframes border-flash { from { box-shadow: inset 0 0 50px red; } to { box-shadow: inset 0 0 150px #000; } }
        .flashing-msg { color: #fff; font-size: 4rem; font-weight: 900; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-3px, 0px); } 100% { transform: translate(1px, -2px); } }

        #admin-trigger { position: fixed; bottom: 0; left: 0; width: 60px; height: 60px; background: transparent; cursor: pointer; z-index: 100001; }
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9998; }
        .shiny-text { font-size: 3.5rem; font-weight: bold; color: var(--accent-color); }
        #top-timer-bar { display: none; background-color: var(--accent-color); color: #432b05; padding: 8px 30px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; margin-top: 20px; }
        
        /* شبكة التصنيفات */
        #categories-screen { display: none; width: 95%; max-width: 1400px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px 20px; }
        .cat-card { background: var(--card-bg); border-radius: 15px; border-bottom: 5px solid var(--accent-color); overflow: hidden; }
        .cat-card.special { border-bottom: 5px solid var(--order-color); }
        .cat-main { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .points-col { display: flex; flex-direction: column; gap: 5px; width: 80px; padding: 10px; }
        .point-box { background: #334155; color: #fff; padding: 12px 5px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 30px; margin: 3px; font-size: 0.9rem; }
        .point-box.used { opacity: 0.2; cursor: default; }
        .cat-title { text-align: center; background: #f1f5f9; color: #000; padding: 10px; font-weight: bold; }

        /* واجهة اللعب */
        #game-interface { display: none; width: 98%; justify-content: space-between; margin-top: 20px; }
        .sidebar { width: 220px; background: rgba(30, 41, 59, 0.6); border: 2px solid var(--accent-color); padding: 15px; border-radius: 15px; text-align: center;}
        .score-display { font-size: 3.5rem; font-weight: bold; color: var(--accent-color); cursor: pointer; }
        .question-card { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; flex-grow: 1; margin: 0 20px; }
        .win-btn { background: var(--accent-color); color: #000; border: none; padding: 15px 30px; margin: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #setup-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        input { width: 300px; padding: 15px; background: #21262d; border: 1px solid var(--accent-color); color: #fff; text-align: center; margin-bottom: 15px; border-radius: 8px;}
    </style>
</head>
<body>

    <div id="maintenance-screen"><h1 style="font-size: 3rem;">الموقع تحت الصيانة ⚠️</h1></div>
    <div id="admin-overlay"><div id="alert-text" class="flashing-msg">تنبيه</div><button class="win-btn" onclick="document.getElementById('admin-overlay').style.display='none'">موافق</button></div>
    <div id="admin-trigger" onclick="handleAdmin()"></div>
    <div id="intro-screen"><div class="shiny-text">سيم جيم لايف زون</div></div>
    <div id="top-timer-bar">00:00</div>

    <div id="setup-screen">
        <h1>🌙 ابدأ التحدي</h1>
        <input type="text" id="t1" placeholder="اسم الفريق الأول">
        <input type="text" id="t2" placeholder="اسم الفريق الثاني">
        <button class="win-btn" onclick="showCategories()">دخول اللعبة</button>
    </div>

    <div id="categories-screen"></div>

    <div id="game-interface">
        <div class="sidebar">
            <div id="side-name-1" style="color:var(--accent-color);"></div>
            <div class="score-display" id="score1" onclick="manualEdit(1)">0</div>
        </div>
        <div class="question-card" id="q-content"></div>
        <div class="sidebar">
            <div id="side-name-2" style="color:var(--accent-color);"></div>
            <div class="score-display" id="score2" onclick="manualEdit(2)">0</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyClRZNm35GpsLiiqXYVUIyt8GOIfa81xlk",
            authDomain: "live-zone-lock.firebaseapp.com",
            projectId: "live-zone-lock",
            databaseURL: "https://live-zone-lock-default-rtdb.firebaseio.com",
            appId: "1:836342074080:web:995a0e934ab0147c085e85"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // متغير لمراقبة حالة الصيانة الحالية
        window.isCurrentlyLocked = false;

        onValue(ref(db, 'siteControl'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.isCurrentlyLocked = !!data.isLocked;
                document.getElementById('maintenance-screen').style.display = data.isLocked ? "flex" : "none";
                if (data.kickAll) { set(ref(db, 'siteControl/kickAll'), false); window.location.href = "about:blank"; }
                if (data.alertActive) {
                    document.getElementById('alert-text').innerText = data.alertMsg;
                    document.getElementById('admin-overlay').style.display = "flex";
                } else { document.getElementById('admin-overlay').style.display = "none"; }
            }
        });

        window.dbSet = (path, val) => set(ref(db, 'siteControl/' + path), val);
    </script>

    <script>
        let score1 = 0, score2 = 0, currentPoints = 0, currentCat = "", currentSide = "", currentPts = 0;
        const rankPoints = {1:3, 2:5, 3:7, 4:9, 5:11, 6:13, 7:15, 8:17, 9:19, 10:21};

        const bank = {
            "أسئلة دينية": {
                icon: "🕌",
                left: { 200: {q:"سورة تنتهي بـ الراء؟", a:"الكوثر"}, 400: {q:"صلاة بلا ركوع ولا سجود؟", a:"الجنازة"}, 600: {q:"صحابي اهتز لموته العرش؟", a:"سعد بن معاذ"}, 800: {q:"أطول آية؟", a:"الدين"}, 1000: {q:"أول من جهر بالقرآن؟", a:"ابن مسعود"} },
                right: { 200: {q:"قلب القرآن؟", a:"يس"}, 400: {q:"عدد السجدات؟", a:"15"}, 600: {q:"سورة بلا بسملة؟", a:"التوبة"}, 800: {q:"البسملة مرتين؟", a:"النمل"}, 1000: {q:"أمين الأمة؟", a:"أبو عبيدة"} }
            },
            "حكام الدول": {
                icon: "👑",
                left: { 200: {q:"ملك السعودية؟", a:"الملك سلمان"}, 400: {q:"حاكم الإمارات؟", a:"الشيخ محمد بن زايد"}, 600: {q:"سلطان عمان؟", a:"هيثم بن طارق"}, 800: {q:"ملك المغرب؟", a:"محمد السادس"}, 1000: {q:"رئيس مصر؟", a:"السيسي"} },
                right: { 200: {q:"أمير قطر؟", a:"الشيخ تميم"}, 400: {q:"ملك الأردن؟", a:"عبدالله الثاني"}, 600: {q:"أمير الكويت؟", a:"الشيخ مشعل"}, 800: {q:"ملك البحرين؟", a:"الملك حمد"}, 1000: {q:"رئيس العراق؟", a:"عبد اللطيف رشيد"} }
            },
            "السيارات": {
                icon: "🚗",
                left: { 200: {q:"بلد لمبورغيني؟", a:"إيطاليا"}, 400: {q:"مبرد المحرك؟", a:"الرديتر"}, 600: {q:"نظام أودي؟", a:"كواترو"}, 800: {q:"محرك أسطوانات متقابلة؟", a:"بوكسر"}, 1000: {q:"أول سيارة تجارية؟", a:"فورد T"} },
                right: { 200: {q:"شعار 4 حلقات؟", a:"أودي"}, 400: {q:"أول تيسلا؟", a:"رودستر"}, 600: {q:"مقر BMW؟", a:"ميونخ"}, 800: {q:"تملك بوجاتي؟", a:"فولكس فاجن"}, 1000: {q:"شعار ميتسوبيشي؟", a:"الجواهر الثلاث"} }
            },
            "الجغرافيا": {
                icon: "🌍",
                left: { 200: {q:"أكبر هضبة؟", a:"التبت"}, 400: {q:"دولة الجزر الكثيرة؟", a:"السويد"}, 600: {q:"أعمق خندق؟", a:"ماريانا"}, 800: {q:"أعلى قمة بأفريقيا؟", a:"كيليمانجارو"}, 1000: {q:"أرض 1000 بحيرة؟", a:"فنلندا"} },
                right: { 200: {q:"عاصمة أيسلندا؟", a:"ريكيافيك"}, 400: {q:"بحر يفصل أفريقيا عن أوروبا؟", a:"المتوسط"}, 600: {q:"نهر باريس؟", a:"السين"}, 800: {q:"أكبر صحراء؟", a:"الكبرى"}, 1000: {q:"أصغر دولة؟", a:"الفاتيكان"} }
            },
            "الترتيب": {
                icon: "🔢", isSpecial: true,
                left: { 200: {q:"رتب 10 ألعاب", a:"1.ببجي 2.ماين كرافت 3.روبلوكس 4.كاندي 5.فورتنايت 6.لول 7.كود 8.أمونج 9.فيفا 10.سيمز"}, 400: {q:"رتب 10 تطبيقات", a:"1.فيس 2.واتس 3.انستا 4.ماسنجر 5.تيك 6.تلغرام 7.سناب 8.تويتر 9.بنترست 10.كواي"}, 600: {q:"رتب 10 دول سياحية", a:"1.فرنسا 2.إسبانيا 3.أمريكا 4.إيطاليا 5.تركيا 6.المكسيك 7.بريطانيا 8.ألمانيا 9.اليونان 10.النمسا"}, 800: {q:"رتب 10 لاعبين", a:"1.رونالدو 2.ميسي 3.نيمار 4.مبابي 5.صلاح 6.بنزيما 7.هالاند 8.ليفا 9.فيني 10.كين"}, 1000: {q:"رتب 10 أندية أبطال", a:"1.ريال 2.ميلان 3.ليفربول 4.بايرن 5.برشلونة 6.أياكس 7.مانشستر 8.انتر 9.يوفنتوس 10.بنفيكا"} },
                right: { 200: {q:"رتب شركات سيارات", a:"1.تويوتا 2.فولكس 3.فورد 4.هيونداي 5.هوندا 6.نيسان 7.GM 8.كيا 9.BMW 10.مرسيدس"}, 400: {q:"رتب أغنى 10", a:"1.ماسك 2.بيزوس 3.أرنو 4.مارك 5.إليسون 6.بافيت 7.غيتس 8.بيج 9.بالمر 10.برين"}, 600: {q:"رتب دول مسلمين", a:"1.إندونيسيا 2.باكستان 3.الهند 4.بنجلاديش 5.نيجيريا 6.مصر 7.تركيا 8.إيران 9.الجزائر 10.السودان"}, 800: {q:"رتب أقوى جيوش", a:"1.أمريكا 2.روسيا 3.الصين 4.الهند 5.كوريا 6.بريطانيا 7.اليابان 8.تركيا 9.باكستان 10.إيطاليا"}, 1000: {q:"رتب قنوات يوتيوب", a:"1.MrBeast 2.T-Series 3.Cocomelon 4.SET 5.Diana 6.Vlad 7.Nastya 8.PewDiePie 9.Zee 10.WWE"} }
            },
            "لايف زون-صيانة": {
                icon: "🛠️",
                left: { 200: {q:"صيانة", a:"صيانة"}, 400: {q:"صيانة", a:"صيانة"}, 600: {q:"صيانة", a:"صيانة"}, 800: {q:"صيانة", a:"صيانة"}, 1000: {q:"صيانة", a:"صيانة"} },
                right: { 200: {q:"صيانة", a:"صيانة"}, 400: {q:"صيانة", a:"صيانة"}, 600: {q:"صيانة", a:"صيانة"}, 800: {q:"صيانة", a:"صيانة"}, 1000: {q:"صيانة", a:"صيانة"} }
            },
            "ألغاز": {
                icon: "🧩",
                left: { 200: {q:"له أوراق وليس شجرة? ", a:"الكتاب"}, 400: {q:"كلما زاد نقص؟", a:"العمر"}, 600: {q:"بالدقيقة مرتين وبالقرن مرة؟", a:"القاف"}, 800: {q:"أصلع في المطر ولا يبتل؟", a:"لأنه أصلع"}, 1000: {q:"يرى كل شيء ولا يملك عيون؟", a:"المرآة"} },
                right: { 200: {q:"إذا ذكرته اختفى؟", a:"الصمت"}, 400: {q:"ابن أمك وليس أخوك؟", a:"أنت"}, 600: {q:"يمشي بلا أرجل؟", a:"الساعة/الماء"}, 800: {q:"يخترق الزجاج ولا يكسره؟", a:"الضوء"}, 1000: {q:"صندوق مليء باللؤلؤ؟", a:"الفم"} }
            }
        };

        function handleAdmin() {
            let p = prompt("كلمة السر:");
            if(p !== "123456") return;
            let action = prompt("1: صيانة (فتح/إغلاق) | 2: طرد | 3: تنبيه");
            
            if(action == "1") {
                // تبديل الحالة تلقائياً
                let newState = !window.isCurrentlyLocked;
                let msg = newState ? "تفعيل وضع الصيانة؟" : "إيقاف وضع الصيانة وفتح الموقع؟";
                if(confirm(msg)) window.dbSet('isLocked', newState);
            }
            else if(action == "2") { 
                if(confirm("طرد الكل؟")) window.dbSet('kickAll', true); 
            }
            else if(action == "3") {
                let msg = prompt("نص التنبيه (فارغ للإغلاق):");
                window.dbSet('alertActive', !!msg);
                window.dbSet('alertMsg', msg || "");
            }
        }

        function showCategories() {
            if(!document.getElementById('t1').value || !document.getElementById('t2').value) return;
            document.getElementById('side-name-1').innerText = document.getElementById('t1').value;
            document.getElementById('side-name-2').innerText = document.getElementById('t2').value;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('top-timer-bar').style.display = 'block';
            startTimer(); renderCategories();
        }

        function renderCategories() {
            const screen = document.getElementById('categories-screen');
            screen.style.display = 'grid'; screen.innerHTML = "";
            Object.keys(bank).forEach(cat => {
                let rowsLeft = "", rowsRight = "";
                [200, 400, 600, 800, 1000].forEach(p => {
                    rowsLeft += `<div class="point-box ${bank[cat].left[p].used?'used':''}" onclick="loadQ('${cat}','left',${p})">${p}</div>`;
                    rowsRight += `<div class="point-box ${bank[cat].right[p].used?'used':''}" onclick="loadQ('${cat}','right',${p})">${p}</div>`;
                });
                screen.innerHTML += `<div class="cat-card ${bank[cat].isSpecial?'special':''}">
                    <div class="cat-main"><div class="points-col">${rowsLeft}</div><div style="font-size:2.2rem">${bank[cat].icon}</div><div class="points-col">${rowsRight}</div></div>
                    <div class="cat-title">${cat}</div></div>`;
            });
        }

        function loadQ(cat, side, pts) {
            if(bank[cat][side][pts].used) return;
            currentCat = cat; currentSide = side; currentPts = pts; currentPoints = pts;
            const data = bank[cat][side][pts];
            document.getElementById('categories-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'flex';
            let html = `<h2>${cat} (${pts})</h2><p style="font-size:2rem">${data.q}</p>`;
            if(bank[cat].isSpecial) {
                const ansList = data.a.split(/\d+\./).filter(x => x.trim()!="");
                html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;">`;
                ansList.forEach((a, i) => {
                    let r = i+1;
                    html += `<div style="background:#1e293b; padding:10px; border-radius:10px;">
                        <span style="font-size:0.8rem; color:#64748b">مركز ${r}</span>
                        <div id="oa-${r}" style="display:none; color:#4ade80">${a}</div>
                        <div id="ob-${r}"><button onclick="givePts(${r},1)">${document.getElementById('t1').value}</button>
                        <button onclick="givePts(${r},2)">${document.getElementById('t2').value}</button></div>
                    </div>`;
                });
                html += `</div><button class="win-btn" onclick="finishQ()">انهاء</button>`;
            } else {
                html += `<div id="ans" style="display:none; color:#4ade80; font-size:2rem; margin:20px">${data.a}</div>
                    <button class="win-btn" onclick="document.getElementById('ans').style.display='block'">كشف</button>
                    <button class="win-btn" onclick="addPts(1)">فوز 1</button><button class="win-btn" onclick="addPts(2)">فوز 2</button>
                    <button class="win-btn" style="background:#64748b" onclick="finishQ()">تخطي</button>`;
            }
            document.getElementById('q-content').innerHTML = html;
        }

        function givePts(r, t) {
            if(t==1) { score1 += rankPoints[r]; document.getElementById('score1').innerText=score1; }
            else { score2 += rankPoints[r]; document.getElementById('score2').innerText=score2; }
            document.getElementById(`oa-${r}`).style.display="block"; document.getElementById(`ob-${r}`).style.display="none";
        }

        function addPts(t) {
            if(t==1) { score1 += currentPoints; document.getElementById('score1').innerText=score1; }
            else if(t==2) { score2 += currentPoints; document.getElementById('score2').innerText=score2; }
            finishQ();
        }

        function finishQ() {
            bank[currentCat][currentSide][currentPts].used = true;
            document.getElementById('game-interface').style.display = 'none'; renderCategories();
        }

        function manualEdit(t) {
            let v = prompt("النقاط:");
            if(v!=null) { if(t==1) { score1=parseInt(v); document.getElementById('score1').innerText=score1; }
            else { score2=parseInt(v); document.getElementById('score2').innerText=score2; } }
        }

        function startTimer() { let s = 0; setInterval(() => { s++; let m=Math.floor(s/60), sc=s%60; document.getElementById('top-timer-bar').innerText = `${m<10?'0'+m:m}:${sc<10?'0'+sc:sc}`; }, 1000); }
        window.onload = () => { setTimeout(()=>document.getElementById('intro-screen').style.display='none', 2000); document.getElementById('setup-screen').style.display='flex'; };
    </script>
</body>
</html>
